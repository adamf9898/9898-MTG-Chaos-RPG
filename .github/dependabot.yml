version: 2
updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
      open-pull-requests-limit: 10
      groups:
          dev-tools:
              patterns:
                  - 'eslint*'
                  - '@eslint/*'
                  - 'prettier'
                  - 'husky'
                  - 'lint-staged'
                  - '@types/*'
      labels:
          - 'dependencies'
          - 'automated'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
          time: '09:00'
      open-pull-requests-limit: 10
      labels:
          - 'dependencies'
          - 'github-actions'
          - 'automated'

name: 'Copilot Setup Steps'

# Run when this file changes (validation) and allow manual triggering
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # MUST be named `copilot-setup-steps` to be picked up by the Copilot cloud agent.
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js (LTS 18)
              uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --legacy-peer-deps

            - name: Verify ESLint is available
              run: npx eslint --version

            - name: Verify Prettier is available
              run: npx prettier --version

            - name: Verify test runner works
              run: node --test tests/core.test.js
